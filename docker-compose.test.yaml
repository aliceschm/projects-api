version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 2s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://test:test@db:5432/test_db
      API_KEY: test-key
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]

  tests:
    build: .
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://test:test@db:5432/test_db
    command: ["pytest", "-v"]
