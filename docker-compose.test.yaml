version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 2s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://test:test@db:5432/test_db
      API_KEY: test-key
    depends_on:
      - db
    ports:
      - "8000:8000"
    entrypoint: ["/entrypoint.sh"]
